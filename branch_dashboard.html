<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Branch</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0b2545;--navy-dark:#081b34;--gold:#d4a017;--bg:#f4f6f9;--green:#1f9d55;--warn:#b7791f;--danger:#c0392b;--border:#e1e6ee;}
*{box-sizing:border-box;margin:0;padding:0;font-family:'Inter',sans-serif;}
body{background:var(--bg);color:#101828;}

.topbar{background:var(--navy);color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:60;box-shadow:0 2px 10px rgba(0,0,0,.12);}
.topbar .brand{display:flex;align-items:center;gap:12px;font-weight:800;font-size:1.05rem;}
.topbar .brand i{color:var(--gold);font-size:1.5rem;}
.topbar .user{font-size:.85rem;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:10px;}
.topbar .user .pill{background:rgba(255,255,255,.12);padding:4px 12px;border-radius:999px;font-weight:600;color:#fff;}
.topbar .user .avatar{width:30px;height:30px;border-radius:50%;background:var(--gold);color:var(--navy);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;}
.logout-btn{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);color:#fff;width:34px;height:34px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.92rem;transition:.15s;}
.logout-btn:hover{background:var(--danger);border-color:var(--danger);}
.menu-toggle{display:none;background:none;border:none;color:#fff;font-size:1.2rem;cursor:pointer;}

.app-shell{display:flex;min-height:calc(100vh - 60px);}
.sidebar{width:230px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);padding:16px 12px;}
.sidebar .nav-link{display:flex;align-items:center;gap:12px;color:#33415c;padding:12px 14px;border-radius:10px;font-size:.92rem;font-weight:600;margin-bottom:4px;text-decoration:none;transition:.15s;}
.sidebar .nav-link i{width:20px;text-align:center;color:#7185a3;font-size:1rem;}
.sidebar .nav-link:hover{background:#eef2f8;}
.sidebar .nav-link.active{background:var(--navy);color:#fff;}
.sidebar .nav-link.active i{color:var(--gold);}
.content{flex:1;min-width:0;padding:26px;}
@media (max-width:820px){
  .sidebar{position:fixed;left:-240px;top:60px;bottom:0;z-index:55;transition:.2s;box-shadow:4px 0 20px rgba(0,0,0,.1);}
  .sidebar.open{left:0;}
  .content{padding:18px;}
  .menu-toggle{display:inline-flex !important;}
}
.wrap{max-width:1100px;margin:0 auto;}

.page-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
.page-head h1{font-size:1.35rem;font-weight:800;}
.page-head p{color:#667085;font-size:.86rem;margin-top:4px;}
.btn{border:none;border-radius:9px;padding:11px 20px;font-weight:600;font-size:.88rem;cursor:pointer;display:inline-flex;align-items:center;gap:8px;text-decoration:none;}
.btn-navy{background:var(--navy);color:#fff;}
.btn-navy:hover{background:var(--navy-dark);}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px;}
@media (max-width:900px){.stats-grid{grid-template-columns:repeat(2,1fr);}}
.stat-card{background:#fff;border-radius:14px;box-shadow:0 4px 14px rgba(20,40,80,.06);padding:18px;display:flex;align-items:center;gap:14px;}
.stat-card .icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.15rem;flex-shrink:0;}
.stat-card .label{font-size:.78rem;color:#667085;}
.stat-card .value{font-size:1.35rem;font-weight:800;}

.section-card{background:#fff;border-radius:14px;box-shadow:0 4px 14px rgba(20,40,80,.06);overflow:hidden;}
.section-card .head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.section-card .head span{font-weight:700;font-size:.95rem;}
.section-card .head a{font-size:.82rem;color:var(--navy);font-weight:600;text-decoration:none;}
table{width:100%;border-collapse:collapse;}
th{text-align:left;font-size:.72rem;text-transform:uppercase;letter-spacing:.04em;color:#66738c;padding:10px 20px;border-bottom:2px solid #eef1f6;}
td{padding:12px 20px;font-size:.86rem;border-bottom:1px solid #f2f4f8;}
tr:last-child td{border-bottom:none;}
.app-no{font-weight:700;color:var(--navy);}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:.72rem;font-weight:700;}
.badge.draft{background:#eef2f8;color:#475467;}
.badge.pending{background:#fef6e7;color:var(--warn);}
.badge.returned{background:#fdecea;color:var(--danger);}
.badge.approved{background:#e8f8ef;color:var(--green);}
.badge.rejected{background:#eaecef;color:#344054;}
.stage-chip{background:#eef2f8;color:var(--navy);font-size:.74rem;font-weight:600;padding:3px 9px;border-radius:999px;}
.view-btn{border:1px solid var(--border);background:#fff;color:var(--navy);font-size:.78rem;font-weight:600;padding:6px 12px;border-radius:7px;cursor:pointer;text-decoration:none;}
.view-btn:hover{background:#f7f9fc;}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand"><button class="menu-toggle" id="menuToggle"><i class="fa-solid fa-bars"></i></button><i class="fa-solid fa-building-columns"></i> Sahakari Bank - Loan Origination System</div>
  <div class="user"><span class="pill"><i class="fa-solid fa-code-branch"></i> Girgaum Branch</span> <span class="avatar">RP</span> <button class="logout-btn" id="logoutBtn" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button></div>
</div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <a class="nav-link active" href="branch_dashboard.html"><i class="fa-solid fa-gauge-high"></i> Dashboard</a>
    <a class="nav-link" href="branch_new_application.html"><i class="fa-solid fa-file-circle-plus"></i> New Application</a>
    <a class="nav-link" href="branch_applications.html"><i class="fa-solid fa-folder-open"></i> All Applications</a>
    <a class="nav-link" href="branch_applications.html?pending=1"><i class="fa-solid fa-hourglass-half"></i> Pending My Action</a>
  </aside>

  <main class="content">
    <div class="wrap">
      <div class="page-head">
        <div>
          <h1>Welcome, Ramesh Patil</h1>
          <p>Branch Manager &middot; Girgaum Branch</p>
        </div>
        <a href="branch_new_application.html" class="btn btn-navy"><i class="fa-solid fa-plus"></i> New Loan Application</a>
      </div>

      <div class="stats-grid" id="statsGrid"></div>

      <div class="section-card">
        <div class="head"><span><i class="fa-solid fa-clock-rotate-left" style="color:var(--navy);margin-right:8px;"></i>Recent Activity</span>
          <a href="branch_applications.html">View all &rarr;</a></div>
        <div style="overflow-x:auto;">
          <table>
            <thead><tr><th>Application No.</th><th>Applicant</th><th>Amount</th><th>Stage</th><th>Status</th><th>Last Update</th><th></th></tr></thead>
            <tbody id="recentBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
/* ============================================================
   BUILT-IN SAMPLE DATASET (no backend / DB connection needed)
   ============================================================ */
const applications = [
  { no:'GIR/HL/2026/0004', applicant:'Priya Deshmukh', amount:2200000, stage:'Board of Directors', status:'pending', updated:'2026-07-18 11:20' },
  { no:'GIR/HL/2026/0003', applicant:'Anil Kumar Verma', amount:950000, stage:'MD Review', status:'pending', updated:'2026-07-17 16:05' },
  { no:'GIR/HL/2026/0002', applicant:'Sunita Rane', amount:1750000, stage:'Branch', status:'returned', updated:'2026-07-16 09:40' },
  { no:'GIR/HL/2026/0001', applicant:'Ramesh Kumar Shah', amount:1500000, stage:'Credit Department', status:'pending', updated:'2026-07-15 14:12' },
  { no:'GIR/HL/2025/0038', applicant:'Meena Joshi', amount:1200000, stage:'Approved & Closed', status:'approved', updated:'2026-06-30 10:00' },
  { no:'GIR/HL/2025/0037', applicant:'Rahul Save', amount:800000, stage:'Approved & Closed', status:'approved', updated:'2026-06-25 12:30' },
  { no:'GIR/HL/2025/0036', applicant:'Fatima Sheikh', amount:600000, stage:'Branch', status:'rejected', updated:'2026-06-18 15:45' },
];

function fmtMoney(v){ return '₹ ' + v.toLocaleString('en-IN'); }

function renderStats(){
  const total = applications.length;
  const pending = applications.filter(a => a.status === 'returned').length; // returned-to-branch = needs branch action
  const approved = applications.filter(a => a.status === 'approved').length;
  const amountTotal = applications.reduce((s,a) => s + a.amount, 0);

  const cards = [
    { label:'Total Applications', value: total, icon:'fa-folder-open', bg:'#eaf0fb', color:'#2b5aad' },
    { label:'Returned to You', value: pending, icon:'fa-hourglass-half', bg:'#fef6e7', color:'var(--warn)' },
    { label:'Approved', value: approved, icon:'fa-circle-check', bg:'#e8f8ef', color:'var(--green)' },
    { label:'Total Amount Requested', value: fmtMoney(amountTotal), icon:'fa-sack-dollar', bg:'#eef2f8', color:'var(--navy)' },
  ];
  document.getElementById('statsGrid').innerHTML = cards.map(c => `
    <div class="stat-card">
      <div class="icon" style="background:${c.bg};color:${c.color};"><i class="fa-solid ${c.icon}"></i></div>
      <div><div class="label">${c.label}</div><div class="value">${c.value}</div></div>
    </div>`).join('');
}

function renderRecent(){
  const rows = [...applications].sort((a,b) => new Date(b.updated) - new Date(a.updated));
  document.getElementById('recentBody').innerHTML = rows.map(a => `
    <tr>
      <td class="app-no">${a.no}</td>
      <td>${a.applicant}</td>
      <td>${fmtMoney(a.amount)}</td>
      <td><span class="stage-chip">${a.stage}</span></td>
      <td><span class="badge ${a.status}">${a.status.charAt(0).toUpperCase()+a.status.slice(1)}</span></td>
      <td style="color:#667085;font-size:.8rem;">${a.updated}</td>
      <td><a class="view-btn" href="branch_applications.html">View</a></td>
    </tr>`).join('');
}

renderStats();
renderRecent();

const menuToggle = document.getElementById('menuToggle');
if (menuToggle) menuToggle.addEventListener('click', () => document.getElementById('sidebar').classList.toggle('open'));

const logoutBtn = document.getElementById('logoutBtn');
if (logoutBtn) logoutBtn.addEventListener('click', () => {
  sessionStorage.clear();
  window.location.href = 'index.html';
});
</script>
</body>
</html>
